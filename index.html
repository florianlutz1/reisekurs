<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Reisekurs</title>
  <meta name="description" content="Währungsrechner für Singapur, Indonesien & Thailand – offline." />

  <!-- PWA / iPhone -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0ea5e9" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Reisekurs" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="title-row">
        <h1>Reisekurs</h1>
        <button id="refresh" class="refresh-btn" aria-label="Kurse aktualisieren" title="Kurse aktualisieren">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-2.64-6.36" />
            <polyline points="21 3 21 9 15 9" />
          </svg>
        </button>
      </div>
      <p id="status" class="status">Lade Kurse…</p>
    </header>

    <!-- Country selector -->
    <div id="tabs" class="tabs" role="tablist"></div>

    <!-- Converter card -->
    <main class="card">
      <div class="field" id="field-top">
        <div class="field-label">
          <span class="flag" id="top-flag"></span>
          <span id="top-name"></span>
        </div>
        <input id="top-input" class="field-value" inputmode="decimal" enterkeyhint="done"
               autocomplete="off" placeholder="0" />
      </div>

      <button id="swap" class="swap-btn" aria-label="Richtung tauschen">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="7 4 4 7 7 10" />
          <line x1="4" y1="7" x2="18" y2="7" />
          <polyline points="17 20 20 17 17 14" />
          <line x1="20" y1="17" x2="6" y2="17" />
        </svg>
      </button>

      <div class="field readonly" id="field-bottom">
        <div class="field-label">
          <span class="flag" id="bottom-flag"></span>
          <span id="bottom-name"></span>
        </div>
        <div id="bottom-value" class="field-value out">0</div>
      </div>
    </main>

    <!-- Quick amounts -->
    <div class="quick" id="quick"></div>

    <!-- Rate mode -->
    <div class="rate-row">
      <div class="segmented" id="rate-mode">
        <button data-mode="official" class="seg active">Tageskurs</button>
        <button data-mode="own" class="seg">Eigener Kurs</button>
      </div>
      <p id="rate-info" class="rate-info"></p>
    </div>

    <!-- Own rate editor -->
    <section class="own-card" id="own-card">
      <h2>Eigener Wechselkurs</h2>
      <p class="own-hint">Trag ein, was du wirklich getauscht hast – z.&nbsp;B. „100&nbsp;€ → 1.560.000&nbsp;Rp“. Dein Kurs wird automatisch berechnet.</p>
      <div class="own-grid">
        <label class="own-input">
          <span>Bezahlt (EUR)</span>
          <input id="own-eur" inputmode="decimal" placeholder="100" autocomplete="off" />
        </label>
        <span class="own-arrow">→</span>
        <label class="own-input">
          <span id="own-local-label">Erhalten</span>
          <input id="own-local" inputmode="decimal" placeholder="0" autocomplete="off" />
        </label>
      </div>
      <div class="own-foot">
        <p id="own-result" class="own-result"></p>
        <button id="own-clear" class="own-clear">Löschen</button>
      </div>
    </section>

    <footer class="footer">
      <p>Kurse: Interbanken-Mittelkurs (sehr nah an Visa/Mastercard). Dient nur zur Orientierung.</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
